body:
  text: 世親菩薩造劉孝蘭譯敬禮世間自在婆伽梵遍計同依他及與圓成實許此三自性智者深所知由緣自在轉及唯分別事所現即依他似現為遍計所現之似現常恆無所有此無變異故即圓成自性遍計彼所現有此二似現彼中無有此彼即無二法云何彼中無謂無能遍計及其所計義說心名分別由因果性故許心有二種謂阿賴耶識及與七種轉初由染種習積集故名心二由於種種行相轉故名彼虛妄分別許亦分三種異熟與執我以及了別他初異熟自體彼即根本識餘者名轉識由能所見轉以有無二一雜染清淨相分別諸自性許此為甚深凡所分別有彼即畢竟無故於遍計性許有有無相錯亂體性有似現體全無故許依他性亦有有無相若二畢竟無無二即是有故於圓成性許有有無相遍計義雖二有無體一故愚夫遍計性許二一自性所現有二分唯亂體一故爰於依他性亦許二一性二體之自性即一無二故亦許圓成性有二一自性遍計及依他雜染相所知唯於圓成性許為清淨相二不諦實性即無事自性故離遍計性無別圓成實無二之自性即二無自性故離圓成實無別遍計性非實唯似現如是無自性故離依他起無別圓成實非實二自性似現體全無故離圓成實無別依他起已觀待名言分別諸自性依彼增上力如次證當說遍計名言性唯餘增益性故離言自性亦當許為餘先於二我無入故入依他二性全非有唯是遍計故次於二無性證入圓成實即此證入時亦說有與無此三自性者無所緣無二極無如是無即無事自性咒力幻作故有象身現起許唯顯現相象實全非有遍計性如象依他猶象相於彼無象事圓成許似此從彼根本識計不實二我二性極無故唯有彼行相根本識如咒真如許似木分別似象相二性則如象若了此真義能如次頓知遍知及永斷所證三種相遍知無所緣淨所現為斷無二為所緣則亦現作證象所緣即無彼行相即滅所得唯木材幻化事如爾如是二叵得二現相亦滅滅時即證彼圓成無二事相違識變故心見無境故三智隨轉故無功解脫故若能觸唯心所知即叵得所知義無故心亦不可得二都無得故即緣於法界由緣法界故即證圓滿德由證圓滿德即能得無上三身菩提智成就自他利一九四九年四月十二日北碚縉雲山附譯者說明一三自性論全論共三十八個頌為了便於閲讀譯者在頌文頭上加上號數並作初步分段遍計所執自性依他起自性和圓成實自性三自性是無著世親學系的總樞紐作者的三自性論對三自性的各別性質相互關係悟入的次策方法和利益等問題都比較集中地和比較具體地作了說明三自性論貫徹了唯識為立場辨證為方法的特點二三自性論的譯稿是一九四九年在重慶譯出的一九五一年來北京後聽說金克木先生已有譯本但未暇對照今年病中無事乃檢金譯同拙譯和原文對照發現金譯有不妥的地方例如第三十五頌原文四句是四件事即四種智攝大乘論叫做四法四法是用來成立唯識義的攝大乘論說諸義現前分明顯現而非是有云何可知如世尊言若諸菩薩成就四法能隨悟入一切唯識都無有義一者成就相違識相智二者成就無所緣識現可得智三者成就應離功用無顛倒智四者成就三種勝智隨轉妙智三自性論列舉這四法同樣是在說明依靠什麼力量悟入唯識的三自性的問題的原文第一句是攝論的第一種智第二句是攝論的第二種智而金譯如次作由滅慧障故以覺見妄故第三句是攝論的第四種智第四句是攝論的第三種智金譯如次作三智隨轉故自然得解脫在字面上雖然對了但由於前二句的錯誤和全頌翻譯的組織形式使人覺得似乎前三句是因第四句是宗這就不對了此外還有很多不符合的地方我們只能認為是不同因為金譯是根據梵文原本並參照藏文二種譯本譯出的拙譯只據藏文標題為世親造的一種譯本希讀者只作為異譯看加以比較研究
